<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToP Vanilla Schedule</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121932;
      --panel-2: #182245;
      --text: #e9eefc;
      --muted: #9fb0dd;
      --accent: #7aa2ff;
      --accent-2: #56e0c5;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 40px rgba(0,0,0,0.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122,162,255,0.14), transparent 32%),
        radial-gradient(circle at top right, rgba(86,224,197,0.10), transparent 28%),
        linear-gradient(180deg, #09101f 0%, #0b1020 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .title {
      font-size: clamp(1.6rem, 2.4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 860px;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(122,162,255,0.12);
      border: 1px solid rgba(122,162,255,0.22);
      color: #dbe6ff;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
    }

    .clock-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .clock-card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      min-height: 132px;
    }

    .clock-label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .clock-time {
      font-size: clamp(1.45rem, 2.1vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .clock-date {
      color: var(--text);
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .clock-meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .cards-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(7, minmax(300px, 1fr));
      gap: 16px;
      min-width: max-content;
    }

    .day-card {
      background: linear-gradient(180deg, var(--panel), rgba(24,34,69,0.96));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .day-card.current::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(122,162,255,0.12), transparent 45%);
      pointer-events: none;
    }

    .day-card.current {
      border-color: rgba(122,162,255,0.55);
      box-shadow: 0 0 0 1px rgba(122,162,255,0.18), var(--shadow);
    }

    .day-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .day-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .day-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .day-tag {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    .day-tag.today {
      background: rgba(122,162,255,0.16);
      border-color: rgba(122,162,255,0.36);
      color: #dbe6ff;
    }

    .next-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .next-label {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .next-name {
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .countdown {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--accent-2);
      margin-bottom: 8px;
    }

    .next-times {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .activities {
      display: grid;
      gap: 10px;
    }

    .activity {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .activity.next {
      background: rgba(122,162,255,0.10);
      border-color: rgba(122,162,255,0.38);
    }

    .activity.past {
      opacity: 0.55;
    }

    .activity-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .activity-name {
      font-weight: 700;
      line-height: 1.35;
    }

    .activity-state {
      font-size: 0.74rem;
      font-weight: 800;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      white-space: nowrap;
      background: rgba(255,255,255,0.03);
    }

    .activity-state.next {
      background: rgba(86,224,197,0.14);
      border-color: rgba(86,224,197,0.36);
      color: #d2fff7;
    }

    .time-pair {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .footer-note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
    }

    @media (max-width: 980px) {
      .clock-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 20px, 1400px);
        padding-top: 16px;
      }

      .cards {
        grid-template-columns: repeat(7, minmax(280px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="hero-card">
        <div class="hero-top">
          <div>
            <h1 class="title">ToP Vanilla Schedule</h1>
          </div>
          <div class="badge-row">
            <div class="badge" id="user-zone-badge">Local timezone</div>
            <div class="badge">Server timezone: America/Los_Angeles</div>
          </div>
        </div>

        <div class="clock-grid">
          <div class="clock-card">
            <div class="clock-label">Your local time</div>
            <div class="clock-time" id="local-time">--:--:--</div>
            <div class="clock-date" id="local-date">---</div>
            <div class="clock-meta" id="local-meta">---</div>
          </div>

          <div class="clock-card">
            <div class="clock-label">Game server time</div>
            <div class="clock-time" id="server-time">--:--:--</div>
            <div class="clock-date" id="server-date">---</div>
            <div class="clock-meta" id="server-meta">---</div>
          </div>

          <div class="clock-card">
            <div class="clock-label">Next available activity</div>
            <div class="clock-time" id="maze-name">--</div>
            <div class="clock-date" id="maze-countdown">---</div>
            <div class="clock-meta" id="maze-meta">---</div>
          </div>
        </div>
      </div>
    </section>

    <section class="cards-scroll">
      <div class="cards" id="cards"></div>
    </section>


  </div>

  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script>
    const { DateTime } = luxon;
    const SERVER_TIMEZONE = 'America/Los_Angeles';
    const WEEKDAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    const scheduleData = {
      Monday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '07:00' },
        { name: 'DW', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'CA', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'Dream City', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Tuesday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'Dream City', time: '05:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'DW', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'CA', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Wednesday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
 
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '07:00' },
        { name: 'Dream City', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'CA', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'DW', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Thursday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'DW', time: '05:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'Dream City', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'CA', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Friday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '07:00' },
        { name: 'DW', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'CA', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'DW', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Saturday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'DW', time: '05:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'Dream City', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'CA', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ],
      Sunday: [
        { name: 'DW', time: '01:00' },
        { name: 'Gold Hunter', time: '03:00' },
        { name: 'CTF', time: '06:00' },
        { name: 'CA', time: '07:00' },
        { name: 'DW', time: '09:00' },
        { name: 'Gold Hunter', time: '10:00' },
        { name: 'CTF', time: '11:00' },
        { name: 'CA', time: '13:00' },
        { name: 'Gold Hunter', time: '15:00' },
        { name: 'Dream City', time: '17:00' },
        { name: 'CTF', time: '18:00' },
        { name: 'DW', time: '21:00' },
        { name: 'Gold Hunter', time: '23:00' }
      ]
    };

    const formatters = {
      localTime: new Intl.DateTimeFormat(undefined, {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }),
      localDate: new Intl.DateTimeFormat(undefined, {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }),
      serverTime: new Intl.DateTimeFormat('en-US', {
        timeZone: SERVER_TIMEZONE,
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }),
      serverDate: new Intl.DateTimeFormat('en-US', {
        timeZone: SERVER_TIMEZONE,
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }),
      localZoneLong: new Intl.DateTimeFormat(undefined, {
        timeZoneName: 'long'
      })
    };

    function zoneSuffix(formatter, date) {
      const zone = formatter.formatToParts(date).find(part => part.type === 'timeZoneName');
      return zone ? zone.value : '';
    }

    function getServerNow(now = new Date()) {
      return DateTime.fromJSDate(now).setZone(SERVER_TIMEZONE);
    }

    function getServerWeekdayName(dt) {
      return WEEKDAYS[dt.weekday % 7];
    }

    function buildServerDateTime(serverDay, hhmm) {
      const [hour, minute] = hhmm.split(':').map(Number);
      return DateTime.fromObject(
        {
          year: serverDay.year,
          month: serverDay.month,
          day: serverDay.day,
          hour,
          minute,
          second: 0,
          millisecond: 0
        },
        { zone: SERVER_TIMEZONE }
      );
    }

    function formatDuration(ms) {
      if (ms <= 0) return 'Now';
      const totalSeconds = Math.floor(ms / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (days > 0) return `${days}d ${hours}h ${minutes}m`;
      if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

    function formatServerDateTime(dt) {
      return dt.setZone(SERVER_TIMEZONE).toFormat('ccc LLL d HH:mm');
    }

    function formatLocalDateTime(dt) {
      return dt.toLocal().toFormat('ccc LLL d HH:mm');
    }

    function getWeekCards(now = new Date()) {
      const serverNow = getServerNow(now);

      return Array.from({ length: 7 }, (_, offset) => {
        const dayDt = serverNow.startOf('day').plus({ days: offset });
        const weekdayName = getServerWeekdayName(dayDt);
        const activities = (scheduleData[weekdayName] || [])
          .map(item => ({
            ...item,
            startDate: buildServerDateTime(
              { year: dayDt.year, month: dayDt.month, day: dayDt.day },
              item.time
            )
          }))
          .sort((a, b) => a.startDate.toMillis() - b.startDate.toMillis());

        let nextIndex = -1;
        if (offset === 0) {
          nextIndex = activities.findIndex(activity => activity.startDate.toMillis() > serverNow.toMillis());
        } else {
          nextIndex = activities.length ? 0 : -1;
        }

        return {
          offset,
          weekdayName,
          isCurrentDay: offset === 0,
          dayDt,
          activities,
          nextIndex
        };
      });
    }

    function findNextActivity(now = new Date()) {
      const serverNow = getServerNow(now);
      for (let offset = 0; offset < 8; offset++) {
        const dayDt = serverNow.startOf('day').plus({ days: offset });
        const weekdayName = getServerWeekdayName(dayDt);
        const activities = (scheduleData[weekdayName] || [])
          .map(item => ({
            ...item,
            startDate: buildServerDateTime(
              { year: dayDt.year, month: dayDt.month, day: dayDt.day },
              item.time
            )
          }))
          .sort((a, b) => a.startDate.toMillis() - b.startDate.toMillis());

        const upcoming = activities.find(activity => activity.startDate.toMillis() > serverNow.toMillis());
        if (upcoming) return upcoming;
      }
      return null;
    }

    function createActivityHTML(activity, isNext, isPast, isCurrentDayCard) {
      const stateLabel = isCurrentDayCard
        ? (isNext ? 'Next' : isPast ? 'Passed' : 'Upcoming')
        : 'Upcoming';
      return `
        <div class="activity ${isNext ? 'next' : ''} ${isPast ? 'past' : ''}">
          <div class="activity-top">
            <div class="activity-name">${activity.name}</div>
            <div class="activity-state ${isNext ? 'next' : ''}">${stateLabel}</div>
          </div>
          <div class="time-pair">
            <div><strong>Server:</strong> ${formatServerDateTime(activity.startDate)}</div>
            <div><strong>Local:</strong> ${formatLocalDateTime(activity.startDate)}</div>
          </div>
        </div>
      `;
    }

    function renderClocks(now = new Date()) {
      const serverNow = getServerNow(now);
      const localZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Local timezone';

      document.getElementById('user-zone-badge').textContent = `Local timezone: ${localZone}`;
      document.getElementById('local-time').textContent = formatters.localTime.format(now);
      document.getElementById('local-date').textContent = formatters.localDate.format(now);
      document.getElementById('local-meta').textContent = zoneSuffix(formatters.localZoneLong, now);

      document.getElementById('server-time').textContent = formatters.serverTime.format(now);
      document.getElementById('server-date').textContent = formatters.serverDate.format(now);
      document.getElementById('server-meta').textContent = `Current server zone: ${serverNow.offsetNameShort}`;

      const nextActivity = findNextActivity(now);
      document.getElementById('maze-name').textContent = nextActivity ? nextActivity.name : 'No activity found';
      document.getElementById('maze-countdown').textContent = nextActivity ? formatDuration(nextActivity.startDate.toMillis() - serverNow.toMillis()) : '---';
      document.getElementById('maze-meta').innerHTML = nextActivity
        ? `<strong>Server:</strong> ${formatServerDateTime(nextActivity.startDate)}<br><strong>Local:</strong> ${formatLocalDateTime(nextActivity.startDate)}`
        : 'Add activities to scheduleData.';
    }

    function renderCards(now = new Date()) {
      const serverNow = getServerNow(now);
      const cards = getWeekCards(now);
      const root = document.getElementById('cards');

      root.innerHTML = cards.map(card => {
        const nextActivity = card.nextIndex >= 0 ? card.activities[card.nextIndex] : null;
        const countdown = nextActivity ? formatDuration(nextActivity.startDate.toMillis() - serverNow.toMillis()) : 'No events';

        const activitiesHTML = card.activities.length
          ? card.activities.map((activity, index) => {
              const isNext = index === card.nextIndex;
              const isPast = card.isCurrentDay && activity.startDate.toMillis() <= serverNow.toMillis() && !isNext;
              return createActivityHTML(activity, isNext, isPast, card.isCurrentDay);
            }).join('')
          : '<div class="activity"><div class="activity-name">No activity configured</div></div>';

        return `
          <article class="day-card ${card.isCurrentDay ? 'current' : ''}">
            <div class="day-head">
              <div>
                <h2 class="day-title">${card.weekdayName}</h2>
                <div class="day-subtitle">Server date: ${card.dayDt.toFormat('LLL d')}</div>
              </div>
              <div class="day-tag ${card.isCurrentDay ? 'today' : ''}">${card.isCurrentDay ? 'Current day' : `+${card.offset} day${card.offset === 1 ? '' : 's'}`}</div>
            </div>

            <div class="next-box">
              <div class="next-label">Next available activity</div>
              <div class="next-name">${nextActivity ? nextActivity.name : 'No activity configured'}</div>
              <div class="countdown">${countdown}</div>
              <div class="next-times">
                ${nextActivity ? `
                  <div><strong>Server:</strong> ${formatServerDateTime(nextActivity.startDate)}</div>
                  <div><strong>Local:</strong> ${formatLocalDateTime(nextActivity.startDate)}</div>
                ` : '<div>Add entries to scheduleData for this day.</div>'}
              </div>
            </div>

            <div class="activities">${activitiesHTML}</div>
          </article>
        `;
      }).join('');
    }

    function tick() {
      const now = new Date();
      renderClocks(now);
      renderCards(now);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
